<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 할 일 - To-Do List</title>
    <meta name="description" content="오늘의 할 일을 기록하고 달성률을 확인하는 간단한 To-do 리스트 앱입니다.">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;">
            <div style="display: flex; align-items: center; justify-content: center; gap: 12px;">
                <h1>오늘의 할 일</h1>
                <img src="company-logo.png" alt="AGI Chang Logo" style="height: 36px; border-radius: 8px;">
            </div>
            <p class="subtitle">모든 목표를 달성해보세요!</p>
        </header>

        <form id="todo-form">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="새로운 할 일을 입력하세요..." autocomplete="off">
                <button type="submit" id="add-btn" aria-label="할 일 추가">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </div>
        </form>

        <div class="stats">
            <span id="progress-text">완료율: 0%</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <ul id="todo-list">
            <!-- 할 일 항목이 여기에 추가됩니다 -->
        </ul>
        
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">📝</div>
            <p>아직 등록된 할 일이 없습니다.<br>오늘의 첫 번째 목표를 추가해보세요!</p>
        </div>
    </div>

    <!-- Canvas Confetti Library for fireworks animation -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Supabase Library (데이터베이스 연동) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="script.js"></script>
</body>
</html>
